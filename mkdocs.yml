site_name: marocAffiliate Documentation
site_description: Technical and product documentation for marocAffiliate
site_url: https://docs.marocaffiliate.com
repo_name: marocAffiliate-docs
repo_url: https://github.com/your-org/marocAffiliate-docs

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Admin Dashboard:
      - Product Management: admin-dashboard/product-management.md
  - Architecture: architecture.md
  - Development: development.md
  - Deployment: deployment.md
