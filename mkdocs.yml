site_name: marocAffiliate Documentation
site_description: Business and product documentation for marocAffiliate platform
site_url: https://docs.marocaffiliate.com
repo_name: maroc-affiliate-docs
repo_url: https://github.com/marocaffiliate/maroc-affiliate-docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
    - toc.sticky

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.superfences
  - pymdownx.tasklist
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Admin Dashboard:
      - Product Management:
          - Product List: admin-dashboard/product/product-list.md
          - Product Creation: admin-dashboard/product/product-creation.md
          - Product Edit: admin-dashboard/product/product-edit.md
          - Product Details & Barcodes: admin-dashboard/product/product-details.md
  - Architecture: architecture.md
  - Development: development.md
  - Deployment: deployment.md
